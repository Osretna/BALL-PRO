<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="60%" stop-color="#020617" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Table Felt Radial Highlight -->
    <radialGradient id="feltGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#08d9e3" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#08d9e3" stop-opacity="0" />
    </radialGradient>

    <!-- Cue Ball Gradient -->
    <radialGradient id="cueBallGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </radialGradient>

    <!-- 8-Ball Gradient -->
    <radialGradient id="eightBallGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="30%" stop-color="#1e293b" />
      <stop offset="85%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Ball Shadow -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Metallic Cue Stick Ring -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Smooth Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Dark Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="112" />

  <!-- Outer Rounded High-Tech Border -->
  <rect x="12" y="12" width="488" height="488" rx="100" fill="none" stroke="url(#neonGlow)" stroke-width="4" stroke-opacity="0.4" />
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="#08d9e3" stroke-width="1.5" stroke-opacity="0.15" />

  <!-- Subtle Felt Texture / Lighting Profile -->
  <rect x="30" y="30" width="452" height="452" rx="82" fill="url(#feltGrad)" />

  <!-- Abstract Cue Sticks crossed in background -->
  <g opacity="0.35">
    <!-- Cue 1 -->
    <line x1="80" y1="432" x2="432" y2="80" stroke="#78350f" stroke-width="12" stroke-linecap="round" />
    <line x1="280" y1="230" x2="432" y2="80" stroke="#fef08a" stroke-width="10" stroke-linecap="round" />
    <!-- Cue Joint Band -->
    <line x1="280" y1="230" x2="290" y2="220" stroke="url(#goldGrad)" stroke-width="12" />

    <!-- Cue 2 -->
    <line x1="432" y1="432" x2="80" y2="80" stroke="#78350f" stroke-width="12" stroke-linecap="round" />
    <line x1="232" y1="230" x2="80" y2="80" stroke="#fef08a" stroke-width="10" stroke-linecap="round" />
    <line x1="232" y1="230" x2="222" y2="220" stroke="url(#goldGrad)" stroke-width="12" />
  </g>

  <!-- 3D Table Pocket Accent at the center top -->
  <circle cx="256" cy="62" r="28" fill="#111827" stroke="#374151" stroke-width="3" />
  <circle cx="256" cy="62" r="22" fill="#000000" />

  <!-- Shadows of the Balls -->
  <ellipse cx="190" cy="315" rx="55" ry="18" fill="url(#shadowGrad)" />
  <ellipse cx="320" cy="245" rx="55" ry="18" fill="url(#shadowGrad)" />

  <!-- The Legendary Black 8-Ball -->
  <g id="eight-ball" transform="translate(190, 275)">
    <!-- Base Spherical ball shadow/body -->
    <circle cx="0" cy="0" r="50" fill="url(#eightBallGrad)" />
    
    <!-- Outer Cyan Neon Highlight to represent Pro Pool applet theme -->
    <circle cx="0" cy="0" r="49.5" fill="none" stroke="#08d9e3" stroke-width="2.5" stroke-opacity="0.8" filter="url(#glow)" />
    
    <!-- White Circle overlay -->
    <circle cx="-6" cy="-6" r="21" fill="#ffffff" />
    
    <!-- "8" Text symbol -->
    <text x="-6" y="2" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="24" fill="#0f172a" text-anchor="middle" dominant-baseline="central">8</text>
    
    <!-- Sphere reflection gleam -->
    <ellipse cx="-15" cy="-18" rx="14" ry="7" transform="rotate(-25, -15, -18)" fill="#ffffff" opacity="0.32" />
  </g>

  <!-- The Cue Ball -->
  <g id="cue-ball" transform="translate(320, 205)">
    <!-- Base Spherical White body -->
    <circle cx="0" cy="0" r="50" fill="url(#cueBallGrad)" />
    
    <!-- Outer Sapphire Neon Highlight -->
    <circle cx="0" cy="0" r="49.5" fill="none" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.6" filter="url(#glow)" />

    <!-- Cute Golden Star Emblem for Elite Champion Level -->
    <path d="M 0,-15 L 4,-5 L 14,-3 L 7,4 L 9,14 L 0,9 L -9,14 L -7,4 L -14,-3 L -4,-5 Z" fill="url(#goldGrad)" transform="scale(0.8)" opacity="0.9" />

    <!-- Sphere reflection gleam -->
    <ellipse cx="-15" cy="-15" rx="14" ry="7" transform="rotate(-25, -15, -15)" fill="#ffffff" opacity="0.6" />
  </g>

  <!-- Golden Crown for the King of 8-Ball, floating above the ball -->
  <g transform="translate(190, 185)" filter="url(#glow)">
    <path d="M -24,14 L -28,-6 L -12,4 L 0,-18 L 12,4 L 28,-6 L 24,14 Z" fill="url(#goldGrad)" />
    <circle cx="-28" cy="-8" r="3" fill="#ffffff" />
    <circle cx="0" cy="-20" r="3" fill="#ffffff" />
    <circle cx="28" cy="-8" r="3" fill="#ffffff" />
  </g>
</svg>
